name: Git Submodules Upgrade
description: Upgrades all git submodules to their latest remote commit and optionally opens a PR.

branding:
  icon: arrow-up-circle
  color: blue

inputs:
  target:
    description: Path to the repository root containing submodules.
    required: false
    default: '.'
  create-pr:
    description: Set to 'false' to skip pull request creation.
    required: false
    default: 'true'
  include:
    description: >
      Newline- or space-separated list of submodule paths to upgrade.
      When set, only these submodules are updated (takes priority over skip).
    required: false
    default: ''
  skip:
    description: >
      Newline- or space-separated list of submodule paths to skip.
      Ignored when include is set.
    required: false
    default: ''
  pr-branch:
    description: Branch name used for the upgrade PR.
    required: false
    default: auto/upgrade-submodules
  pr-title:
    description: Title of the pull request.
    required: false
    default: 'chore: upgrade git submodules'
  pr-commit-message:
    description: Commit message for the submodule upgrade commit.
    required: false
    default: 'chore: upgrade git submodules'
  reviewer:
    description: GitHub username to request a review from (optional).
    required: false
    default: ''
  token:
    description: >
      GitHub token used to create pull requests.
      Defaults to github.token. Supply a PAT if your repository
      does not allow GitHub Actions to create pull requests.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Configure git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Upgrade submodules
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        INCLUDE: ${{ inputs.include }}
        SKIP: ${{ inputs.skip }}
        SCRIPT: ${{ github.action_path }}/scripts/upgrade-git-submodules
      run: bash "${{ github.action_path }}/scripts/run-upgrade"

    - name: Check for changes
      id: changes
      shell: bash
      run: |
        if git -C "${{ inputs.target }}" diff --quiet HEAD; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create PR
      if: steps.changes.outputs.changed == 'true' && inputs.create-pr == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TARGET: ${{ inputs.target }}
        PR_BRANCH: ${{ inputs.pr-branch }}
        COMMIT_MSG: ${{ inputs.pr-commit-message }}
        PR_TITLE: ${{ inputs.pr-title }}
        REVIEWER: ${{ inputs.reviewer }}
        BASE_BRANCH: ${{ github.ref_name }}
        REPO: ${{ github.repository }}
      run: bash "${{ github.action_path }}/scripts/open-pr"
