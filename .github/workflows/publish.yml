name: Publish

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+'
  workflow_run:
    workflows: ["Tag"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "name=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package artifacts
        run: bash scripts/package dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          gh release create "$TAG" dist/release.zip \
            --title "$TAG" \
            --generate-notes
