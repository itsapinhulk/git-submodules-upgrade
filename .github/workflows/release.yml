name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cut:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        run: bash scripts/release -y

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Package artifacts
        run: bash scripts/package dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          release_id=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "$(python3 -c "
          import json, sys
          print(json.dumps({
              'tag_name': sys.argv[1],
              'name': sys.argv[1],
              'generate_release_notes': True,
          }))
          " "$TAG")" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          curl -sf \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/zip" \
            "https://uploads.github.com/repos/${REPO}/releases/${release_id}/assets?name=release.zip" \
            --data-binary @dist/release.zip


