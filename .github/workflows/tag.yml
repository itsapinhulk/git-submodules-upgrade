name: Tag

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify vendored script is in sync
        run: bash test/check-vendored-script

      - name: Tag and push
        run: bash scripts/release -y
